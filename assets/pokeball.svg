<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background fills to edges -->
  <rect width="1024" height="1024" fill="#1a1a2e"/>

  <!-- Pokeball outer border — fills nearly edge-to-edge -->
  <circle cx="512" cy="512" r="500" fill="#1a1a1a"/>

  <!-- Red top half -->
  <clipPath id="topHalf">
    <rect x="0" y="0" width="1024" height="512"/>
  </clipPath>
  <circle cx="512" cy="512" r="468" fill="#e94560" clip-path="url(#topHalf)"/>

  <!-- White bottom half -->
  <clipPath id="bottomHalf">
    <rect x="0" y="512" width="1024" height="512"/>
  </clipPath>
  <circle cx="512" cy="512" r="468" fill="#f5f5f5" clip-path="url(#bottomHalf)"/>

  <!-- Thick center band -->
  <rect x="12" y="476" width="1000" height="72" fill="#1a1a1a"/>

  <!-- Center button — much bigger with visible ring -->
  <circle cx="512" cy="512" r="100" fill="#1a1a1a"/>
  <circle cx="512" cy="512" r="82" fill="#333333"/>
  <circle cx="512" cy="512" r="64" fill="#f5f5f5"/>
  <circle cx="512" cy="512" r="50" fill="none" stroke="#cccccc" stroke-width="4"/>
</svg>
